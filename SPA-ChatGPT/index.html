<!DOCTYPE html>
<html lang="en">
<head>

  <title>Mobile First SPA</title>
  <link rel="stylesheet" href="/css/main.css" />
</head>

  <nav class="bottom-nav">

  <script src="/js/toggleTopBar.js"></script>
